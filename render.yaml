services:
  - type: web
    name: invoice-ai-backend
    runtime: python
    rootDir: apps/backend
    buildCommand: pip install -r requirements.txt
    preDeployCommand: python schema.py
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.13.0
      - key: EMAIL_PROVIDER
        value: console
      - key: JWT_EXPIRES_MINUTES
        value: "1440"
      - key: REVIEW_TOKEN_EXPIRES_MINUTES
        value: "1440"
      - key: JWT_SECRET
        generateValue: true
      - key: GROQ_API_KEY
        sync: false
      - key: APP_BASE_URL
        sync: false
      - key: CORS_ORIGINS
        sync: false
